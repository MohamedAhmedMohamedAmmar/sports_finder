# ─────────────────────────────────────────────
# Application
# ─────────────────────────────────────────────
spring.application.name=SportFinder
server.port=8081

# ─────────────────────────────────────────────
# DataSource  — Docker MySQL on port 3308
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3308/sportfinder?useSSL=false&serverTimezone=Africa/Cairo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate


# ─────────────────────────────────────────────
# Email Configuration
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# ─────────────────────────────────────────────
# Connection Pool
# ─────────────────────────────────────────────
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─────────────────────────────────────────────
# Thymeleaf
# ─────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─────────────────────────────────────────────
# Session
# ─────────────────────────────────────────────
server.servlet.session.timeout=30d
server.servlet.session.cookie.http-only=true

# ─────────────────────────────────────────────
# File upload
# ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ─────────────────────────────────────────────
# Timezone
# ─────────────────────────────────────────────
spring.jackson.time-zone=${TZ:Africa/Cairo}
