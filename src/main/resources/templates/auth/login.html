<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login - SportFinder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .form-group { margin-bottom: 1rem; }
        #emailError, #passwordError { color: red; font-size: 0.85rem; display: block; margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <div class="container">
        <div class="card">
            <h2 style="margin-bottom:10px;text-align:center;">Login</h2>

            <!-- Spring Security error param -->
            <div th:if="${param.error}"
                 style="background:#f8d7da;color:#721c24;padding:12px;border-radius:4px;margin-bottom:1rem;border:1px solid #f5c6cb;">
                Invalid email or password. Please try again.
            </div>
            <div th:if="${param.logout}"
                 style="background:#d4edda;color:#155724;padding:12px;border-radius:4px;margin-bottom:1rem;border:1px solid #c3e6cb;">
                You have been logged out.
            </div>
            <div th:if="${success}"
                 style="background:#d4edda;color:#155724;padding:12px;border-radius:4px;margin-bottom:1rem;border:1px solid #c3e6cb;"
                 th:text="${success}"></div>

            <!--
                Spring Security processes POST /login itself.
                usernameParameter = "email", passwordParameter = "password"
            -->
            <form id="loginForm" action="/login" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required
                           onchange="validateEmail(this)"/>
                    <span id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           onchange="validatePassword(this)"/>
                    <span id="passwordError"></span>
                </div>
                <br/>
                <button type="submit" class="btn">Login</button>
            </form>

            <p style="text-align:center;margin-top:1rem;">
                Don't have an account? <a href="/signup">Sign up</a>
            </p>
        </div>
    </div>

    <script th:src="@{/js/login.js}"></script>
</body>
</html>
