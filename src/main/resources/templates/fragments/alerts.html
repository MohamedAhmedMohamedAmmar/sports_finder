<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="alerts">
    <div th:if="${success}"
         style="background:#d4edda;color:#155724;padding:12px 16px;border-radius:6px;margin-bottom:1rem;border:1px solid #c3e6cb;"
         th:text="${success}"></div>
    <div th:if="${error}"
         style="background:#f8d7da;color:#721c24;padding:12px 16px;border-radius:6px;margin-bottom:1rem;border:1px solid #f5c6cb;"
         th:text="${error}"></div>
</div>
</body>
</html>
