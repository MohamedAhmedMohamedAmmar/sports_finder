<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Browse Courts - SportFinder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/browse.css}"/>
</head>
<body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <div class="browsing-container">

        <!-- ── Sidebar Filters ─────────────────────────────────────── -->
        <div class="sidebar">
            <form id="filterForm" method="GET" action="/browse">
                <h3>Filters
                    <span class="menu-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                            <path d="M96 128C78.3 128 64 142.3 64 160C64 177.7 78.3 192 96 192L182.7 192C195 220.3 223.2 240 256 240C288.8 240 317 220.3 329.3 192L544 192C561.7 192 576 177.7 576 160C576 142.3 561.7 128 544 128L329.3 128C317 99.7 288.8 80 256 80C223.2 80 195 99.7 182.7 128L96 128zM96 288C78.3 288 64 302.3 64 320C64 337.7 78.3 352 96 352L342.7 352C355 380.3 383.2 400 416 400C448.8 400 477 380.3 489.3 352L544 352C561.7 352 576 337.7 576 320C576 302.3 561.7 288 544 288L489.3 288C477 259.7 448.8 240 416 240C383.2 240 355 259.7 342.7 288L96 288zM96 448C78.3 448 64 462.3 64 480C64 497.7 78.3 512 96 512L150.7 512C163 540.3 191.2 560 224 560C256.8 560 285 540.3 297.3 512L544 512C561.7 512 576 497.7 576 480C576 462.3 561.7 448 544 448L297.3 448C285 419.7 256.8 400 224 400C191.2 400 163 419.7 150.7 448L96 448z"/>
                        </svg>
                    </span>
                </h3>

                <!-- Search -->
                <div class="search-bar">
                    <input type="text" name="search" class="search-input"
                           placeholder="Search courts..."
                           th:value="${search}" id="searchInput"/>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
                        <path d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"/>
                    </svg>
                </div>

                <!-- Sports -->
                <div class="filter-section">
                    <div class="filter-title" onclick="toggleFilter(this)">
                        Sports
                        <span class="toggle-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M297.4 470.6C309.9 483.1 330.2 483.1 342.7 470.6L534.7 278.6C547.2 266.1 547.2 245.8 534.7 233.3C522.2 220.8 501.9 220.8 489.4 233.3L320 402.7L150.6 233.4C138.1 220.9 117.8 220.9 105.3 233.4C92.8 245.9 92.8 266.2 105.3 278.7L297.3 470.7z"/></svg>
                        </span>
                    </div>
                    <div class="category-list active">
                        <label class="checkbox-label" th:each="sport : ${sports}">
                            <input type="checkbox" name="sports" th:value="${sport.id}"
                                   class="sport-checkbox"
                                   th:checked="${#lists.contains(selectedSports, sport.id)}"/>
                            <span th:text="${sport.sportName}">Sport</span>
                        </label>
                    </div>
                </div>

                <!-- Price -->
                <div class="filter-section">
                    <div class="filter-title" onclick="toggleFilter(this)">
                        Price
                        <span class="toggle-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M297.4 470.6C309.9 483.1 330.2 483.1 342.7 470.6L534.7 278.6C547.2 266.1 547.2 245.8 534.7 233.3C522.2 220.8 501.9 220.8 489.4 233.3L320 402.7L150.6 233.4C138.1 220.9 117.8 220.9 105.3 233.4C92.8 245.9 92.8 266.2 105.3 278.7L297.3 470.7z"/></svg>
                        </span>
                    </div>
                    <div class="price-input-container active">
                        <div class="price-input">
                            <div class="price-field">
                                <span>Min</span>
                                <input type="number" class="min-input" name="min_price"
                                       th:value="${minPrice}" min="0" max="10000" step="1"/>
                            </div>
                            <div class="price-field">
                                <span>Max</span>
                                <input type="number" class="max-input" name="max_price"
                                       th:value="${maxPrice}" min="0" max="10000" step="1"/>
                            </div>
                        </div>
                        <div class="slider"><div class="price-slider"></div></div>
                        <div class="range-input">
                            <input type="range" class="min-range" min="0" max="10000" th:value="${minPrice}" step="1"/>
                            <input type="range" class="max-range" min="0" max="10000" th:value="${maxPrice}" step="1"/>
                        </div>
                    </div>
                </div>

                <!-- Court Type -->
                <div class="filter-section">
                    <div class="filter-title" onclick="toggleFilter(this)">
                        Court Type
                        <span class="toggle-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M297.4 470.6C309.9 483.1 330.2 483.1 342.7 470.6L534.7 278.6C547.2 266.1 547.2 245.8 534.7 233.3C522.2 220.8 501.9 220.8 489.4 233.3L320 402.7L150.6 233.4C138.1 220.9 117.8 220.9 105.3 233.4C92.8 245.9 92.8 266.2 105.3 278.7L297.3 470.7z"/></svg>
                        </span>
                    </div>
                    <div class="style-list active">
                        <label class="checkbox-label">
                            <input type="checkbox" name="types" value="indoor"
                                   th:checked="${#lists.contains(selectedTypes,'indoor') or #lists.contains(selectedTypes,'Indoor')}"/>
                            <span>Indoor</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" name="types" value="outdoor"
                                   th:checked="${#lists.contains(selectedTypes,'outdoor') or #lists.contains(selectedTypes,'Outdoor')}"/>
                            <span>Outdoor</span>
                        </label>
                    </div>
                </div>

                <div style="display:flex;gap:.8rem;flex-direction:column;margin-top:1rem;">
                    <button type="submit" class="apply-filter-btn">Apply Filters</button>
                    <button type="button" class="reset-filter-btn" onclick="resetFilters()">Reset Filters</button>
                </div>
            </form>
        </div>

        <!-- ── Main Content ─────────────────────────────────────────── -->
        <div class="main-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <h2 style="color:#333;">Available Facilities</h2>
                <p style="color:grey;">
                    Showing <span th:text="${#lists.size(courts)}">0</span> results
                    <span th:if="${search != null and !search.isBlank()}">
                        for &ldquo;<span th:text="${search}">query</span>&rdquo;
                    </span>
                </p>
            </div>

            <div class="facilities-grid" th:if="${not #lists.isEmpty(courts)}">
                <div class="facility-card" th:each="court : ${courts}"
                     th:onclick="'window.location.href=\'/courts/' + ${court.id} + '\''">
                    <div class="facility-image-wrapper">
                        <div th:if="${court.imageUrl == null or court.imageUrl.isBlank()}"
                             style="width:100%;height:200px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:4rem;">
                            &#127951;
                        </div>
                        <img th:unless="${court.imageUrl == null or court.imageUrl.isBlank()}"
                             th:src="${court.imageUrl}" th:alt="${court.name}"
                             class="facility-image"/>
                        <span class="facility-badge"
                              th:classappend="${court.courtType}"
                              th:text="${court.getCourtTypeDisplay()}">Type</span>
                    </div>
                    <div class="facility-info">
                        <h3 class="facility-name" th:text="${court.name}">Name</h3>
                        <p class="facility-sport">
                            <strong th:text="${court.sport?.sportName ?: 'Sport'}">Sport</strong>
                        </p>
                        <p class="facility-address">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <span th:text="${court.address + ', ' + court.city}">Address</span>
                        </p>
                        <div class="facility-footer">
                            <p class="facility-price">
                                EGP <span th:text="${#numbers.formatDecimal(court.pricePerHour,1,2)}">0</span>
                                <span>/hour</span>
                            </p>
                            <button class="book-btn"
                                    th:onclick="'event.stopPropagation(); window.location.href=\'/courts/' + ${court.id} + '\''">
                                Details
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(courts)}"
                 style="text-align:center;padding:3rem;grid-column:1/-1;">
                <p style="font-size:1.1rem;color:#999;">No courts found matching your filters.</p>
                <a href="/browse" style="color:#667eea;font-weight:600;margin-top:1rem;display:inline-block;">Clear filters</a>
            </div>
        </div>
    </div>

    <script th:src="@{/js/browse.js}"></script>
    <script th:src="@{/js/inputRange.js}"></script>
</body>
</html>
