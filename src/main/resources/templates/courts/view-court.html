<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${court.name} + ' - SportFinder'">Court</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/view-court.css}"/>
    <style>
        .court-hero{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:3rem 2rem;text-align:center;}
        .court-container{max-width:960px;margin:2rem auto;padding:0 2rem;display:grid;grid-template-columns:1fr 360px;gap:2rem;}
        .detail-card{background:white;padding:2rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:1.5rem;}
        .detail-card h2{color:#333;margin-bottom:1rem;border-bottom:2px solid #667eea;padding-bottom:.5rem;}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0;}
        .info-item label{font-size:.85rem;color:#666;display:block;margin-bottom:.2rem;}
        .info-item p{font-weight:600;color:#333;}
        .booking-card{background:white;padding:1.5rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);position:sticky;top:20px;}
        .booking-card h3{color:#667eea;margin-bottom:1rem;}
        .price-display{font-size:2rem;font-weight:700;color:#667eea;text-align:center;margin:1rem 0;}
        .amenity-badge{display:inline-block;background:#e8f0fe;color:#667eea;padding:.3rem .8rem;border-radius:20px;font-size:.85rem;margin:.2rem;}
        @media(max-width:768px){.court-container{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <div class="court-hero">
        <h1 th:text="${court.name}">Court Name</h1>
        <p>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: inline; margin-right: 0.4rem;">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span th:text="${court.city}">City</span>
        </p>
           &nbsp;|&nbsp;
           <span th:if="${court.sport != null}" th:text="${court.sport.sportName}">Sport</span>
           &nbsp;|&nbsp;
           <span th:text="${court.getCourtTypeDisplay()}">Type</span>
        </p>
    </div>

    <div class="court-container">
        <!-- Details -->
        <div>
            <!-- Flash from redirect -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${bookingError}" class="alert alert-error" th:text="${bookingError}"></div>

            <div class="detail-card">
                <h2>Court Details</h2>
                <div th:if="${court.imageUrl != null and !court.imageUrl.isBlank()}"
                     style="margin-bottom:1rem;">
                    <img th:src="${court.imageUrl}" th:alt="${court.name}"
                         style="width:100%;border-radius:8px;max-height:260px;object-fit:cover;"/>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Sport</label>
                        <p th:text="${court.sport?.sportName ?: 'N/A'}">Sport</p>
                    </div>
                    <div class="info-item">
                        <label>Type</label>
                        <p th:text="${court.getCourtTypeDisplay()}">Type</p>
                    </div>
                    <div class="info-item">
                        <label>Price per Hour</label>
                        <p>EGP <span th:text="${#numbers.formatDecimal(court.pricePerHour,1,2)}">0.00</span></p>
                    </div>
                    <div class="info-item">
                        <label>Address</label>
                        <p th:text="${court.address + ', ' + court.city}">Address</p>
                    </div>
                </div>
            </div>

            <div class="detail-card" th:if="${court.description != null and !court.description.isBlank()}">
                <h2>Description</h2>
                <p th:text="${court.description}">Description</p>
            </div>

            <div class="detail-card" th:if="${not #sets.isEmpty(court.amenities)}">
                <h2>Amenities</h2>
                <div>
                    <span class="amenity-badge"
                          th:each="a : ${court.amenities}"
                          th:text="${a.amenityName}">Amenity</span>
                </div>
            </div>
        </div>

        <!-- Booking sidebar -->
        <div>
            <div class="booking-card">
                <h3>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: inline; margin-right: 0.4rem;">
                        <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    Book This Court
                </h3>
                <div class="price-display">
                    EGP <span th:text="${#numbers.formatDecimal(court.pricePerHour,1,2)}">0</span>
                    <span style="font-size:1rem;font-weight:400;">/hr</span>
                </div>

                <!-- Only TRAINEE can book -->
                <div sec:authorize="hasRole('TRAINEE')">
                    <form th:action="@{/bookings/court}" method="post"
                          id="bookingForm"
                          th:attr="data-price-per-hour=${court.pricePerHour}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="courtId" th:value="${court.id}"/>

                        <div class="form-group">
                            <label>Booking Date *</label>
                            <input type="date" id="bookingDate" name="bookingDate" required/>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Start Time *</label>
                                <input type="time" id="startTime" name="startTime" required/>
                            </div>
                            <div class="form-group">
                                <label>End Time *</label>
                                <input type="time" id="endTime" name="endTime" required/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Players</label>
                            <input type="number" name="playersCount" min="1" max="50" value="1"/>
                        </div>
                        <div class="form-group">
                            <label>Contact Phone *</label>
                            <input type="tel" name="contactPhone" required placeholder="+20 1xx xxx xxxx"/>
                        </div>
                        <div class="form-group">
                            <label>Notes</label>
                            <textarea name="notes" rows="2"></textarea>
                        </div>

                        <div class="booking-summary" style="display:none;" id="bookingSummary">
                            <p>Duration: <strong id="summaryDuration">-</strong></p>
                            <p>Total: <strong id="totalCost">EGP 0.00</strong></p>
                        </div>

                        <button type="submit" class="btn btn-block btn-primary">Book Now</button>
                    </form>
                </div>

                <div sec:authorize="isAnonymous()" style="text-align:center;color:#666;">
                    <a href="/login" style="color:#667eea;font-weight:600;">Login</a> to book this court.
                </div>
                <div sec:authorize="hasAnyRole('COACH','COURT_OWNER','ADMIN')"
                     style="text-align:center;color:#666;font-size:.9rem;">
                    Only trainees can book courts.
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/view-court.js}"></script>
    <script>
        // Set min date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('bookingDate').min = today;
    </script>
</body>
</html>
