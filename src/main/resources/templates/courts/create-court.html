<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${editMode} ? 'Edit Court' : 'Create Court' + ' - SportFinder'">Court Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .page-header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:2.5rem 2rem;text-align:center;}
        .form-container{max-width:800px;margin:2rem auto;padding:0 2rem;}
        .form-card{background:white;padding:2rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);}
        .form-section{margin-bottom:2rem;}
        .form-section h3{color:#667eea;margin-bottom:1rem;border-bottom:1px solid #eee;padding-bottom:.5rem;}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
        .form-group{margin-bottom:1rem;}
        .form-group label{display:block;font-weight:600;margin-bottom:.4rem;color:#333;}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:.7rem;border:1px solid #ddd;border-radius:6px;font-size:.95rem;}
        .form-group textarea{resize:vertical;min-height:80px;}
        .checkbox-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;}
        .checkbox-grid label{display:flex;align-items:center;gap:.4rem;font-weight:400;cursor:pointer;}
        .error-msg{color:#e74c3c;font-size:.85rem;margin-top:.3rem;}
        .btn-submit{width:100%;padding:1rem;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
        .btn-submit:hover{opacity:.9;}
        .btn-danger{padding:.7rem 1.5rem;background:#e74c3c;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
        @media(max-width:600px){.form-row{grid-template-columns:1fr;}.checkbox-grid{grid-template-columns:repeat(3,1fr);}}
    </style>
</head>
<body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <div class="page-header">
        <h1 th:text="${editMode} ? '&#9998; Edit Court' : '&#43; Create New Court'">Court Form</h1>
    </div>

    <div class="form-container">
        <div class="form-card">
            <div th:if="${error}" style="background:#f8d7da;color:#721c24;padding:12px;border-radius:4px;margin-bottom:1rem;" th:text="${error}"></div>

            <form th:action="@{/courts/create}" method="post" th:object="${courtForm}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{id}"/>

                <!-- Basic Info -->
                <div class="form-section">
                    <h3>Basic Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Court Name *</label>
                            <input type="text" th:field="*{name}" placeholder="e.g. Downtown Tennis Court"/>
                            <div class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>
                        <div class="form-group">
                            <label>Sport *</label>
                            <select th:field="*{sportId}">
                                <option value="">-- Select Sport --</option>
                                <option th:each="sport : ${sports}"
                                        th:value="${sport.id}"
                                        th:text="${sport.sportName}">Sport</option>
                            </select>
                            <div class="error-msg" th:if="${#fields.hasErrors('sportId')}" th:errors="*{sportId}"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Court Type *</label>
                            <select th:field="*{courtType}">
                                <option value="">-- Select Type --</option>
                                <option value="indoor">Indoor</option>
                                <option value="outdoor">Outdoor</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Price per Hour (EGP) *</label>
                            <input type="number" th:field="*{pricePerHour}" step="0.01" min="0.01"/>
                            <div class="error-msg" th:if="${#fields.hasErrors('pricePerHour')}" th:errors="*{pricePerHour}"></div>
                        </div>
                    </div>
                </div>

                <!-- Location -->
                <div class="form-section">
                    <h3>Location</h3>
                    <div class="form-group">
                        <label>Address *</label>
                        <input type="text" th:field="*{address}" placeholder="Street address"/>
                        <div class="error-msg" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                    </div>
                    <div class="form-group">
                        <label>City *</label>
                        <input type="text" th:field="*{city}" placeholder="Cairo"/>
                        <div class="error-msg" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>
                    </div>
                </div>

                <!-- Schedule -->
                <div class="form-section">
                    <h3>Schedule</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Opening Time</label>
                            <input type="time" th:field="*{openTime}"/>
                        </div>
                        <div class="form-group">
                            <label>Closing Time</label>
                            <input type="time" th:field="*{closeTime}"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Available Days</label>
                        <div class="checkbox-grid">
                            <label th:each="day : ${ {'Mon','Tue','Wed','Thu','Fri','Sat','Sun'} }">
                                <input type="checkbox" name="daysOpen" th:value="${day}"
                                       th:checked="${courtForm.daysOpen != null and #lists.contains(courtForm.daysOpen, day)}"/>
                                <span th:text="${day}">Day</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Amenities -->
                <div class="form-section" th:if="${not #lists.isEmpty(amenities)}">
                    <h3>Amenities</h3>
                    <div class="checkbox-grid">
                        <label th:each="amenity : ${amenities}">
                            <input type="checkbox" name="amenityIds" th:value="${amenity.id}"/>
                            <span th:text="${amenity.amenityName}">Amenity</span>
                        </label>
                    </div>
                </div>

                <!-- Media & Description -->
                <div class="form-section">
                    <h3>Details</h3>
                    <div class="form-group">
                        <label>Image URL</label>
                        <input type="url" th:field="*{imageUrl}" placeholder="https://..."/>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea th:field="*{description}" placeholder="Describe your court..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-submit"
                        th:text="${editMode} ? 'Update Court' : 'Create Court'">Submit</button>
            </form>

            <!-- Delete button in edit mode -->
            <div th:if="${editMode}" style="margin-top:1rem;text-align:right;">
                <form th:action="@{/courts/delete/{id}(id=${courtForm.id})}" method="post"
                      onsubmit="return confirm('Delete this court?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-danger">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: inline; margin-right: 0.4rem;">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                        Delete Court
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
