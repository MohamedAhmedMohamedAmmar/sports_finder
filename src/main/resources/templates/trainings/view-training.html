    <!DOCTYPE html>
    <html lang="en" xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title th:text="${training.name} + ' - SportFinder'">Session</title>
        <link rel="stylesheet" th:href="@{/css/style.css}"/>
        <link rel="stylesheet" th:href="@{/css/view-court.css}"/>
        <style>
            .session-hero{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:3rem 2rem;text-align:center;}
            .session-container{max-width:900px;margin:2rem auto;padding:0 2rem;display:grid;grid-template-columns:1fr 360px;gap:2rem;}
            .detail-card{background:white;padding:2rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-bottom:1.5rem;}
            .detail-card h2{color:#333;margin-bottom:1rem;border-bottom:2px solid #667eea;padding-bottom:.5rem;}
            .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0;}
            .info-item label{font-size:.85rem;color:#666;display:block;margin-bottom:.2rem;}
            .info-item p{font-weight:600;color:#333;}
            .badge{padding:.3rem .8rem;border-radius:20px;font-size:.85rem;font-weight:500;background:#e8f0fe;color:#667eea;display:inline-block;margin:.2rem;}
            .badge-level{background:#f3e5f5;color:#7b1fa2;}
            .booking-card{background:white;padding:1.5rem;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.08);position:sticky;top:20px;}
            .booking-card h3{color:#667eea;margin-bottom:1rem;}
            .price-display{font-size:2rem;font-weight:700;color:#667eea;text-align:center;margin:1rem 0;}
            .form-group{margin-bottom:1rem;}
            .form-group label{display:block;font-weight:600;margin-bottom:.4rem;color:#333;}
            .form-group input,.form-group select,.form-group textarea{width:100%;padding:.6rem;border:1px solid #ddd;border-radius:6px;font-size:.95rem;}
            .btn-book{width:100%;padding:1rem;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;}
            .btn-book:hover{opacity:.9;}
            .coach-link{color:#667eea;text-decoration:none;font-weight:600;}
            .coach-link:hover{text-decoration:underline;}
            @media(max-width:768px){.session-container{grid-template-columns:1fr;}}
        </style>
    </head>
    <body>
        <div th:replace="~{fragments/nav :: nav}"></div>

        <div class="session-hero">
            <h1 th:text="${training.name}">Session Name</h1>
            <p>by
                <a th:href="@{/trainers/{id}(id=${training.coach.id})}"
                style="color:white;font-weight:700;"
                th:text="${training.coach.fullName}">Coach</a>
                &nbsp;|&nbsp;
                <span th:if="${training.sport != null}" th:text="${training.sport.sportName}">Sport</span>
            </p>
        </div>

        <div class="session-container">
            <!-- Left: details -->
            <div>
                <div class="detail-card">
                    <h2>Session Details</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Sport</label>
                            <p th:text="${training.sport?.sportName ?: 'N/A'}">Sport</p>
                        </div>
                        <div class="info-item">
                            <label>Level</label>
                            <p><span class="badge badge-level" th:text="${training.level}">Level</span></p>
                        </div>
                        <div class="info-item">
                            <label>Price per Hour</label>
                            <p>EGP <span th:text="${#numbers.formatDecimal(training.pricePerHour,1,2)}">0</span></p>
                        </div>
                        <div class="info-item">
                            <label>Min Sessions</label>
                            <p th:text="${training.minSessions ?: 'N/A'}">N/A</p>
                        </div>
                        <div class="info-item" th:if="${training.location != null}">
                            <label>Location</label>
                            <p th:text="${training.location}">Location</p>
                        </div>
                        <div class="info-item" th:if="${training.yearsExperience != null}">
                            <label>Years Experience</label>
                            <p th:text="${training.yearsExperience} + ' years'">N/A</p>
                        </div>
                    </div>
                </div>

                <div class="detail-card" th:if="${training.description != null and !training.description.isBlank()}">
                    <h2>About This Session</h2>
                    <p th:text="${training.description}">Description</p>
                </div>

                <div class="detail-card" th:if="${training.goals != null and !training.goals.isBlank()}">
                    <h2>Training Goals</h2>
                    <p th:text="${training.goals}">Goals</p>
                </div>

                <div class="detail-card" th:if="${training.certifications != null and !training.certifications.isBlank()}">
                    <h2>Certifications</h2>
                    <div>
                        <span class="badge"
                            th:each="cert : ${#strings.arraySplit(training.certifications, ',')}"
                            th:text="${#strings.trim(cert)}">Cert</span>
                    </div>
                </div>

                <div class="detail-card">
                    <h2>About the Coach</h2>
                    <p>
                        <strong><a th:href="@{/trainers/{id}(id=${training.coach.id})}"
                                class="coach-link"
                                th:text="${training.coach.fullName}">Coach</a></strong>
                    </p>
                    <!-- <p th:if="${training.coach?.bio }" th:text="${training.coach?.bio}" style="color:#666;margin-top:.5rem;">Bio</p> -->
                </div>
            </div>

            <!-- Right: booking form -->
            <div>
                <div class="booking-card">
                    <h3>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: inline; margin-right: 0.4rem;">
                            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        Book This Session
                    </h3>

                    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
                    <div class="alert alert-error" th:if="${bookingError}" th:text="${bookingError}"></div>

                    <div class="price-display">
                        EGP <span th:text="${#numbers.formatDecimal(training.pricePerHour,1,2)}">0</span>
                        <span style="font-size:1rem;font-weight:400;">/hr</span>
                    </div>

                    <div sec:authorize="hasRole('TRAINEE')">
                        <form th:action="@{/bookings/training}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="trainingId" th:value="${training.id}"/>

                            <div class="form-group">
                                <label>Preferred Date</label>
                                <input type="date" name="preferredDate" required
                                    th:min="${#temporals.format(#temporals.createNow(),'yyyy-MM-dd')}"/>
                            </div>
                            <div class="form-group">
                                <label>Preferred Time</label>
                                <input type="time" name="preferredTime" required/>
                            </div>
                            <div class="form-group">
                                <label>Number of Sessions</label>
                                <input type="number" name="sessionsCount" min="1" value="1" required/>
                            </div>
                            <div class="form-group">
                                <label>Your Level</label>
                                <select name="levelRequested">
                                    <option value="">-- Select Level --</option>
                                    <option value="Beginner">Beginner</option>
                                    <option value="Intermediate">Intermediate</option>
                                    <option value="Advanced">Advanced</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Message to Coach (optional)</label>
                                <textarea name="message" rows="2" placeholder="Any specific goals or requirements..."></textarea>
                            </div>
                            <button type="submit" class="btn-book">Book Now</button>
                        </form>
                    </div>

                    <div sec:authorize="isAnonymous()">
                        <p style="text-align:center;color:#666;">
                            <a href="/login" style="color:#667eea;font-weight:600;">Login</a> to book this session.
                        </p>
                    </div>

                    <div sec:authorize="hasAnyRole('COACH','COURT_OWNER','ADMIN')">
                        <p style="text-align:center;color:#666;font-size:.9rem;">Only trainees can book training sessions.</p>
                    </div>
                </div>
            </div>
        </div>
    </body>
    </html>
