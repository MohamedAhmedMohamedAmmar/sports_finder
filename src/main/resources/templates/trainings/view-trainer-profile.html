<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${trainer.fullName} + ' - SportFinder'">Trainer Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/trainer-profile.css}"/>
</head>
<body>
    <div th:replace="~{fragments/nav :: nav}"></div>

    <div class="container" style="padding-top:2rem;">
        <a href="/browse-sessions" class="back-btn">← Back to Sessions</a>

        <div class="trainer-card">
            <div class="trainer-header">
                <img th:src="${trainer.profile != null and trainer.profile.avatar != null ? trainer.profile.avatar : 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + trainer.id}"
                     th:alt="${trainer.fullName}" class="trainer-avatar"/>
                <div class="trainer-info">
                    <h1 th:text="${trainer.fullName}">Trainer Name</h1>
                    <p>
                        <strong th:text="${trainer.profile != null and trainer.profile.bio != null ? #strings.abbreviate(trainer.profile.bio, 30) : 'Coach'}">Sport</strong> Coach
                    </p>
                    <p th:if="${trainer.profile != null and trainer.profile.location != null}"
                       th:text="${trainer.profile.location}">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display: inline; margin-right: 0.4rem;">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span th:text="${trainer.profile.location}">Location</span>
                    </p>

                    <div class="stats-grid" th:if="${not #lists.isEmpty(trainings)}">
                        <div class="stat-item">
                            <span class="stat-value" th:text="${#lists.size(trainings)}">0</span>
                            <span class="stat-label">Active Sessions</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="trainer-body">
                <div class="section" th:if="${trainer.profile != null and trainer.profile.bio != null and !trainer.profile.bio.isBlank()}">
                    <h2>About</h2>
                    <p class="bio-text" th:text="${trainer.profile.bio}">Bio</p>
                </div>

                <div class="section" th:if="${trainer.profile != null and trainer.profile.location != null and !trainer.profile.location.isBlank()}">
                    <h2>Location</h2>
                    <div class="tags">
                        <span class="tag" th:text="${trainer.profile.location}">Location</span>
                    </div>
                </div>

                <div class="section">
                    <h2>Details</h2>
                    <div class="detail-row">
                        <span class="detail-label">Sport:</span>
                        <span class="detail-value" th:text="${trainer.profile != null and trainer.profile.bio != null ? trainer.profile.bio : 'Coach'}">Sport</span>
                    </div>
                    <div class="detail-row" th:if="${trainer.profile != null and trainer.profile.location != null}">
                        <span class="detail-label">Location:</span>
                        <span class="detail-value" th:text="${trainer.profile.location}">Location</span>
                    </div>
                </div>

                <div class="section">
                    <h2>Get In Touch</h2>
                    <div class="contact-section">
                        <div class="contact-item">
                            <strong>Email:</strong>
                            <a th:href="'mailto:' + ${trainer.email}" th:text="${trainer.email}">email</a>
                        </div>
                        <div class="contact-item" th:if="${trainer.profile != null and trainer.profile.phone != null}">
                            <strong>Phone:</strong>
                            <a th:href="'tel:' + ${trainer.profile.phone}" th:text="${trainer.profile.phone}">phone</a>
                        </div>
                    </div>
                </div>

                <div class="section" th:if="${not #lists.isEmpty(trainings)}">
                    <h2>Active Sessions</h2>
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;">
                        <div th:each="t : ${trainings}"
                             style="background:#f8f9fa;border-radius:8px;padding:1rem;border-left:3px solid #667eea;">
                            <h4 style="color:#333;margin-bottom:.3rem;" th:text="${t.name}">Name</h4>
                            <p style="color:#667eea;font-size:.9rem;font-weight:600;" th:text="${t.level}">Level</p>
                            <p style="color:#666;font-size:.9rem;" th:if="${t.specialty != null}" th:text="${t.specialty}">Specialty</p>
                            <p style="font-weight:700;color:#667eea;margin-top:.5rem;">
                                EGP <span th:text="${#numbers.formatDecimal(t.pricePerHour,1,2)}">0</span>/hr
                            </p>
                            <a th:href="@{/sessions/{id}(id=${t.id})}"
                               style="display:inline-block;margin-top:.5rem;padding:.4rem .8rem;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:6px;text-decoration:none;font-size:.85rem;font-weight:600;">
                                Book Session
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
